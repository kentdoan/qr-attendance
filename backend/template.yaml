AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart QR Attendance API - Serverless Backend

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Environment:
      Variables:
        SESSIONS_TABLE: !Ref SessionsTable
        QR_TOKENS_TABLE: !Ref QrTokensTable
        ATTENDANCE_TABLE: !Ref AttendanceTable
        COURSES_TABLE: !Ref CoursesTable

Resources:
  # ==========================================
  # 1. DynamoDB Tables
  # ==========================================
  CoursesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: courseId
          AttributeType: S
        - AttributeName: teacherId
          AttributeType: S
      KeySchema:
        - AttributeName: courseId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TeacherIdIndex
          KeySchema:
            - AttributeName: teacherId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: teacherId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: TeacherIdIndex
          KeySchema:
            - AttributeName: teacherId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  QrTokensTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  AttendanceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: studentId
          AttributeType: S
        - AttributeName: checkinTime
          AttributeType: N
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: studentId
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: StudentIdIndex
          KeySchema:
            - AttributeName: studentId
              KeyType: HASH
            - AttributeName: checkinTime
              KeyType: RANGE
          Projection:
            ProjectionType: ALL

  # ==========================================
  # 2. Secrets Manager (HMAC Key)
  # ==========================================
  HmacSecretV2:
    Type: AWS::SecretsManager::Secret
    Properties:
      Description: "Secret key for generating and validating QR HMAC tokens"
      GenerateSecretString:
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  # ==========================================
  # 3. Cognito User Pool
  # ==========================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: QRAttendanceUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: school
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: faculty
          AttributeDataType: String
          Mutable: true
          Required: false
        - Name: major
          AttributeDataType: String
          Mutable: true
          Required: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: QRAttendanceWebClient
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH
      WriteAttributes:
        - email
        - name
        - custom:school
        - custom:faculty
        - custom:major
      ReadAttributes:
        - email
        - name
        - custom:role
        - custom:school
        - custom:faculty
        - custom:major

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ADMIN
      UserPoolId: !Ref UserPool

  TeacherGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: TEACHER
      UserPoolId: !Ref UserPool

  StudentGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: STUDENT
      UserPoolId: !Ref UserPool

  # ==========================================
  # 4. API Gateway (HTTP API)
  # ==========================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - "*"
        AllowMethods:
          - "*"
        MaxAge: 3600
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
            IdentitySource: "$request.header.Authorization"
      # Giới hạn mặc định cho toàn bộ API
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50   
        ThrottlingRateLimit: 30    
      RouteSettings:
        "POST /checkin":
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10  
        "GET /sessions/{sessionId}/qr":
          ThrottlingBurstLimit: 30
          ThrottlingRateLimit: 20  
        "POST /sessions":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5   
        "POST /admin/assign-teacher":
          ThrottlingBurstLimit: 5
          ThrottlingRateLimit: 3   
        "POST /admin/revoke-teacher":
          ThrottlingBurstLimit: 5
          ThrottlingRateLimit: 3
        "POST /courses":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5
        "GET /courses":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5

  # ==========================================
  # 5. Lambda Functions
  # ==========================================
  
  # 5.1 Auth Function (Cognito Post Confirmation)
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: authIndex.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminUpdateUserAttributes
              Resource: "*"
      Events:
        PostConfirmation:
          Type: Cognito
          Properties:
            UserPool: !Ref UserPool
            Trigger: PostConfirmation
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/authIndex.ts

  # 5.1.1 Course Function
  CourseFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: courseIndex.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref CoursesTable
      Events:
        CreateCourse:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /courses
            Method: POST
        GetCourses:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /courses
            Method: GET
        DeleteCourse:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /courses/{courseId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/courseIndex.ts

  # 5.2 Session Function
  SessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: sessionIndex.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref CoursesTable
      Events:
        CreateSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions
            Method: POST
        GetListSessions:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions
            Method: GET
        GetSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: GET
        CloseSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/close
            Method: PATCH
        DeleteSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/sessionIndex.ts

  # 5.3 QR Generator Function
  QrGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: qrGeneratorIndex.handler
      Environment:
        Variables:
          HMAC_SECRET_ARN: !Ref HmacSecretV2
          SESSIONS_TABLE: !Ref SessionsTable
          QR_TOKENS_TABLE: !Ref QrTokensTable
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBWritePolicy:
            TableName: !Ref QrTokensTable
        - Version: '2012-10-17'
          Statement:
            - Effect: Allow
              Action:
                - secretsmanager:GetSecretValue
              Resource: !Ref HmacSecretV2
      Events:
        GenerateQR:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/qr
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/qrGeneratorIndex.ts

  # 5.4 Check-in Function
  CheckinFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: checkinIndex.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref QrTokensTable
        - DynamoDBCrudPolicy:
            TableName: !Ref AttendanceTable
      Events:
        Checkin:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /checkin
            Method: POST
        GetMyAttendance:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /my-attendance
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/checkinIndex.ts

  # 5.5 Report Function
  ReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: reportIndex.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref AttendanceTable
      Events:
        GetReport:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/report
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/reportIndex.ts

  # 5.6 Admin Function
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: adminIndex.handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminRemoveUserFromGroup
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:ListUsers
                - cognito-idp:AdminDeleteUser
                - cognito-idp:AdminListGroupsForUser
              Resource: !GetAtt UserPool.Arn
      Events:
        AssignTeacher:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/assign-teacher
            Method: POST
        RevokeTeacher:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/revoke-teacher
            Method: POST
        ListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/users
            Method: GET
        DeleteUser:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/users/{username}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/adminIndex.ts

  # ==========================================
  # 6. CloudWatch Alarms
  # ==========================================
  AlarmTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "QRAttendanceAlarmTopic-${AWS::StackName}"

  # Cảnh báo lỗi cho chức năng Điểm danh 
  CheckinErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Cảnh báo nếu CheckinFunction có từ 5 lỗi trở lên trong 1 phút"
      Namespace: "AWS/Lambda"
      MetricName: "Errors"
      Dimensions:
        - Name: FunctionName
          Value: !Ref CheckinFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmTopic

  # Cảnh báo lỗi cho chức năng Tạo/Lấy phiên
  SessionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "Cảnh báo nếu SessionFunction có từ 5 lỗi trở lên trong 1 phút"
      Namespace: "AWS/Lambda"
      MetricName: "Errors"
      Dimensions:
        - Name: FunctionName
          Value: !Ref SessionFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref AlarmTopic

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient

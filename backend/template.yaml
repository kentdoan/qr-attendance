AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Smart QR Attendance API - Serverless Backend

Globals:
  Function:
    Timeout: 10
    MemorySize: 256
    Runtime: nodejs24.x
    Architectures:
      - arm64
    Environment:
      Variables:
        SESSIONS_TABLE: !Ref SessionsTable
        QR_TOKENS_TABLE: !Ref QrTokensTableV2
        ATTENDANCE_TABLE: !Ref AttendanceTable

Resources:
  # ==========================================
  # 1. DynamoDB Tables
  # ==========================================
  SessionsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH

  QrTokensTableV2:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: token
          AttributeType: S
      KeySchema:
        - AttributeName: token
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: expiresAt
        Enabled: true

  AttendanceTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: sessionId
          AttributeType: S
        - AttributeName: studentId
          AttributeType: S
      KeySchema:
        - AttributeName: sessionId
          KeyType: HASH
        - AttributeName: studentId
          KeyType: RANGE

  # ==========================================
  # 2. Secrets Manager (HMAC Key)
  # ==========================================
  HmacSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: /qr-attendance/hmac-key
      Description: "Secret key for generating and validating QR HMAC tokens"
      GenerateSecretString:
        PasswordLength: 32
        ExcludeCharacters: '"@/\'

  # ==========================================
  # 3. Cognito User Pool
  # ==========================================
  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: QRAttendanceUserPool
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 8
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false
          RequireUppercase: true
      Schema:
        - Name: role
          AttributeDataType: String
          Mutable: true
        - Name: name
          AttributeDataType: String
          Mutable: true
          Required: false

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: QRAttendanceWebClient
      UserPoolId: !Ref UserPool
      ExplicitAuthFlows:
        - ALLOW_USER_PASSWORD_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
        - ALLOW_USER_SRP_AUTH

  AdminGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: ADMIN
      UserPoolId: !Ref UserPool

  TeacherGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: TEACHER
      UserPoolId: !Ref UserPool

  StudentGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: STUDENT
      UserPoolId: !Ref UserPool

  # ==========================================
  # 4. API Gateway (HTTP API)
  # ==========================================
  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - "*"
        AllowMethods:
          - "*"
        MaxAge: 3600
      Auth:
        DefaultAuthorizer: CognitoAuthorizer
        Authorizers:
          CognitoAuthorizer:
            JwtConfiguration:
              issuer: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}"
              audience:
                - !Ref UserPoolClient
            IdentitySource: "$request.header.Authorization"
      # Giới hạn mặc định cho toàn bộ API
      DefaultRouteSettings:
        ThrottlingBurstLimit: 50   # Số request tối đa được xử lý đồng thời trong 1 burst
        ThrottlingRateLimit: 30    # Số request/giây tối đa cho toàn bộ API
      # Giới hạn riêng cho từng route nhạy cảm
      RouteSettings:
        "POST /checkin":
          ThrottlingBurstLimit: 20
          ThrottlingRateLimit: 10  # Giới hạn chặt nhất: route dễ bị spam nhất
        "GET /sessions/{sessionId}/qr":
          ThrottlingBurstLimit: 30
          ThrottlingRateLimit: 20  # Giáo viên lấy QR mỗi 30s, không cần cao
        "POST /sessions":
          ThrottlingBurstLimit: 10
          ThrottlingRateLimit: 5   # Tạo session: ít dùng
        "POST /admin/assign-teacher":
          ThrottlingBurstLimit: 5
          ThrottlingRateLimit: 3   # Admin routes: ít dùng, giới hạn chặt
        "POST /admin/revoke-teacher":
          ThrottlingBurstLimit: 5
          ThrottlingRateLimit: 3

  # ==========================================
  # 5. Lambda Functions
  # ==========================================
  
  # 5.1 Auth Function (Cognito Post Confirmation)
  AuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: authIndex.handler
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminUpdateUserAttributes
              Resource: "*"
      Events:
        PostConfirmation:
          Type: Cognito
          Properties:
            UserPool: !Ref UserPool
            Trigger: PostConfirmation
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/authIndex.ts

  # 5.2 Session Function
  SessionFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: sessionIndex.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref SessionsTable
      Events:
        CreateSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions
            Method: POST
        GetSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: GET
        CloseSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/close
            Method: PATCH
        DeleteSession:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}
            Method: DELETE
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/sessionIndex.ts

  # 5.3 QR Generator Function
  QrGeneratorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: qrGeneratorIndex.handler
      Environment:
        Variables:
          HMAC_SECRET_ARN: !Ref HmacSecret
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBWritePolicy:
            TableName: !Ref QrTokensTableV2
        - AWSSecretsManagerGetSecretValuePolicy:
            SecretArn: !Ref HmacSecret
      Events:
        GenerateQR:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/qr
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/qrGeneratorIndex.ts

  # 5.4 Check-in Function
  CheckinFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: checkinIndex.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref QrTokensTableV2
        - DynamoDBCrudPolicy:
            TableName: !Ref AttendanceTable
      Events:
        Checkin:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /checkin
            Method: POST
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/checkinIndex.ts

  # 5.5 Report Function
  ReportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: reportIndex.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref SessionsTable
        - DynamoDBReadPolicy:
            TableName: !Ref AttendanceTable
      Events:
        GetReport:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /sessions/{sessionId}/report
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/reportIndex.ts

  # 5.6 Admin Function
  AdminFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: .
      Handler: adminIndex.handler
      Environment:
        Variables:
          USER_POOL_ID: !Ref UserPool
      Policies:
        - Statement:
            - Effect: Allow
              Action:
                - cognito-idp:AdminAddUserToGroup
                - cognito-idp:AdminRemoveUserFromGroup
                - cognito-idp:AdminUpdateUserAttributes
                - cognito-idp:ListUsers
              Resource: !GetAtt UserPool.Arn
      Events:
        AssignTeacher:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/assign-teacher
            Method: POST
        RevokeTeacher:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/revoke-teacher
            Method: POST
        ListUsers:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /admin/users
            Method: GET
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: true
        Target: "es2020"
        Sourcemap: true
        EntryPoints: 
        - src/indexes/adminIndex.ts

Outputs:
  ApiEndpoint:
    Description: "API Gateway endpoint URL"
    Value: !Sub "https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com/"
  UserPoolId:
    Description: "Cognito User Pool ID"
    Value: !Ref UserPool
  UserPoolClientId:
    Description: "Cognito User Pool Client ID"
    Value: !Ref UserPoolClient

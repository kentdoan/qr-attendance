name: Deploy Backend (SAM)

on:
  workflow_dispatch:     
  push:
    branches:
      - develop  # Chỉ chạy khi có code mới đẩy lên nhánh develop
    paths:
      - 'backend/**' # Chỉ chạy khi có thay đổi trong thư mục backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup AWS SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1 # Thay bằng Region của bạn (VD: us-east-1)

      - name: SAM Build
        run: sam build
        working-directory: ./backend

      - name: SAM Deploy
        run: |
          sam deploy \
            --stack-name qr-attendance-backend-dev \
            --resolve-s3 \
            --capabilities CAPABILITY_IAM CAPABILITY_NAMED_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset
        working-directory: ./backend
